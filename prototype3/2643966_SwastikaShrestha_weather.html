<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Wheather App Sheffield</title>
  <link rel="stylesheet" href="2643966_SwastikaShrestha_weather.css">
</head>
<body>
 
<div class="container">
  <h1>Weather App Sheffield</h1>
  <input type="text" id="cityInput" placeholder="Enter city name">
  <button id="searchBtn">search</button>

   <h2 id="cityName">City Name </h2>
   <p id="displayDate">Day, Date</p>
   <div class="weather-main">
      <img id="weatherIcon" src="" alt="Weather Icon">
      <h1 id="tempDisplay"> --°C</h1>
   <p id="conditionMain"style="font-weight: bold; font-size: 20px;">Condition</p>
   <p id="conditionDesc"style="font-size: italic;">Detailed Description</p>
   </div>
    <hr>
    <div class="weather-details">
       <p><strong>Pressure:</strong> <span id="pressureVal">0</span> hPa</p>
       <p><strong>Humidity:</strong> <span id="humidityVal">0</span>%</p>
       <p><strong>Wind Speed:</strong> <span id="windSpeedVal">0</span> m/s</p>
      <p><strong>Wind Direction:</strong> <span id="windDirVal">0</span>°</p>
    </div>
</div>
  <script src="2643966_SwastikaShrestha_weather.js"></script>
</body>
</html>
